# fuzzel configuration — Gruvbox Dark theme
# Colors sourced from ~/.config/waybar/gruvbox.css
# Fuzzel uses RRGGBBaa format (no leading #, alpha as last two hex digits)

[main]
font=Noto Sans:size=12
prompt="> "
placeholder=Search...
lines=10
width=40
horizontal-pad=16
vertical-pad=8
inner-pad=4
anchor=center
layer=overlay


[colors]
# dark0        #282828 — main window background
background=282828ff
# light1       #ebdbb2 — normal text (unselected entries)
text=ebdbb2ff
# light2       #d5c4a1 — message text (slightly dimmed)
message=d5c4a1ff
# bright_yellow #fabd2f — prompt character
prompt=fabd2fff
# gray         #928374 — placeholder and counter (muted)
placeholder=928374ff
# light0       #fbf1c7 — active input text (brightest light)
input=fbf1c7ff
# bright_yellow #fabd2f — matched substring in unselected entries
match=fabd2fff
# dark2        #504945 — selected entry background
selection=504945ff
# light0       #fbf1c7 — selected entry text
selection-text=fbf1c7ff
# bright_orange #fe8019 — matched substring in selected entry
selection-match=fe8019ff
# gray         #928374 — match counter
counter=928374ff
# bright_aqua #8ec07c — border
border=8ec07cff

[border]
width=2
radius=10
