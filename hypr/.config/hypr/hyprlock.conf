# hyprlock.conf
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
# Gruvbox Dark palette reference:
#   bg      #282828    fg      #ebdbb2
#   bg1     #3c3836    fg1     #d5c4a1
#   bg2     #504945    fg2     #bdae93
#   bg3     #665c54    fg3     #a89984
#   bg4     #7c6f64    gray    #928374
#   red     #cc241d    b.red   #fb4934
#   green   #98971a    b.grn   #b8bb26
#   yellow  #d79921    b.yel   #fabd2f
#   blue    #458588    b.blu   #83a598
#   purple  #b16286    b.pur   #d3869b
#   aqua    #689d6a    b.aqu   #8ec07c   <- matches active_border in hyprland.conf
#   orange  #d65d0e    b.org   #fe8019

general {
    hide_cursor      = true
    grace            = 2        # seconds before lock is enforced after trigger
    ignore_empty_input = true   # don't shake on empty submit
}

# ── Background (applied to every monitor) ────────────────────────────────────

background {
    monitor =
    path = screenshot           # blur a live screenshot of the desktop

    blur_passes  = 2
    blur_size    = 5
    noise        = 0.0117
    contrast     = 0.8916
    brightness   = 0.8
    vibrancy     = 0.1696
    vibrancy_darkness = 0.0

    # Semi-transparent gruvbox-bg overlay to deepen the blur
    color = rgba(28282880)
}

# ── Time ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text      = cmd[update:1000] date '+%I:%M %p'
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    color     = rgba(ebdbb2ff)  # fg

    position = 0, 0
    halign   = center
    valign   = top

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(28282899)
    shadow_boost  = 1.2
}

# ── Date ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    # updates every minute
    text      = cmd[update:60000] date '+%A, %B %-d'
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    color     = rgba(d5c4a1ff)  # fg1

    position = 0, -150
    halign   = center
    valign   = top

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(28282899)
}

# ── User Photo ───────────────────────────────────────────────────────────────

image {
    monitor =
    path = ~/.face
    size = 200
    rounding = -1  # circle

    border_size = 3
    border_color = rgba(8ec07cff)  # bright aqua

    position = 0, 0
    halign   = center
    valign   = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(28282899)
}

# ── User Icon (fallback if no ~/.face) ───────────────────────────────────────

label {
    monitor =
    text      = cmd[] sh -c 'if [ -f ~/.face ]; then echo ""; else echo "󰀄"; fi'
    font_size = 150
    font_family = JetBrainsMono Nerd Font
    color     = rgba(8ec07cff)  # bright aqua

    position = 0, 0
    halign   = center
    valign   = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(28282899)
}

