# ── Password Input ───────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 320, 52

    outline_thickness = 2
    dots_size     = 0.28
    dots_spacing  = 0.18
    dots_center   = true
    dots_rounding = -1  # inherit outer rounding

    outer_color    = rgba(928374ff)  # gray       — idle border
    inner_color    = rgba(3c3836cc)  # bg1        — fill (semi-transparent)
    font_color     = rgba(ebdbb2ff)  # fg         — typed characters
    check_color    = rgba(fabd2fff)  # b.yellow   — verifying
    fail_color     = rgba(fb4934ff)  # b.red      — wrong password
    capslock_color = rgba(fe8019ff)  # b.orange   — caps lock warning

    fade_on_empty = false
    fade_timeout  = 1200  # ms before placeholder fades back in

    placeholder_text = <i><span foreground="##7c6f64">Input Password</span></i>
    fail_text        = <i><span foreground="##fb4934">Incorrect ($ATTEMPTS)</span></i>
    hide_input = false

    rounding = 8

    position = 0, -150
    halign   = center
    valign   = center
}
