# hyprlock.conf
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
# Gruvbox Dark palette reference:
#   bg      #282828    fg      #ebdbb2
#   bg1     #3c3836    fg1     #d5c4a1
#   bg2     #504945    fg2     #bdae93
#   bg3     #665c54    fg3     #a89984
#   bg4     #7c6f64    gray    #928374
#   red     #cc241d    b.red   #fb4934
#   green   #98971a    b.grn   #b8bb26
#   yellow  #d79921    b.yel   #fabd2f
#   blue    #458588    b.blu   #83a598
#   purple  #b16286    b.pur   #d3869b
#   aqua    #689d6a    b.aqu   #8ec07c   ← matches active_border in hyprland.conf
#   orange  #d65d0e    b.org   #fe8019

general {
    hide_cursor      = true
    grace            = 2        # seconds before lock is enforced after trigger
    ignore_empty_input = true   # don't shake on empty submit
}

# ── Background (applied to every monitor) ────────────────────────────────────

background {
    monitor =
    path = screenshot           # blur a live screenshot of the desktop

    blur_passes  = 3
    blur_size    = 8
    noise        = 0.0117
    contrast     = 0.8916
    brightness   = 0.8
    vibrancy     = 0.1696
    vibrancy_darkness = 0.0

    # Semi-transparent gruvbox-bg overlay to deepen the blur
    color = rgba(28282880)
}

# ── Time ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text      = $TIME
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    color     = rgba(ebdbb2ff)  # fg

    position = 0, 80
    halign   = center
    valign   = center

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(28282899)
    shadow_boost  = 1.2
}

# ── Date ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    # updates every minute
    text      = cmd[update:60000] date '+%A, %B %-d'
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    color     = rgba(d5c4a1ff)  # fg1

    position = 0, -20
    halign   = center
    valign   = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(28282899)
}

# ── User ─────────────────────────────────────────────────────────────────────

label {
    monitor =
    text      =  $USER   # nerd font person icon
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    color     = rgba(8ec07cff)  # bright aqua

    position = 0, 130
    halign   = center
    valign   = bottom

    shadow_passes = 1
    shadow_size   = 2
    shadow_color  = rgba(28282899)
}

# ── Password Input ───────────────────────────────────────────────────────────

input-field {
    monitor =
    size = 320, 52

    outline_thickness = 2
    dots_size     = 0.28
    dots_spacing  = 0.18
    dots_center   = true
    dots_rounding = -1  # inherit outer rounding

    outer_color    = rgba(928374ff)  # gray       — idle border
    inner_color    = rgba(3c3836cc)  # bg1        — fill (semi-transparent)
    font_color     = rgba(ebdbb2ff)  # fg         — typed characters
    check_color    = rgba(fabd2fff)  # b.yellow   — verifying
    fail_color     = rgba(fb4934ff)  # b.red      — wrong password
    capslock_color = rgba(fe8019ff)  # b.orange   — caps lock warning

    fade_on_empty = true
    fade_timeout  = 1200  # ms before placeholder fades back in

    placeholder_text = <i><span foreground="##a89984"> Password…</span></i>
    fail_text        = <i><span foreground="##fb4934">Incorrect ($ATTEMPTS)</span></i>
    hide_input = false

    rounding = 8

    position = 0, 68
    halign   = center
    valign   = bottom
}
```

Here's a breakdown of the design choices:

- **Background:** Takes a live screenshot and runs it through 3 blur passes with a semi-transparent gruvbox `#282828` overlay to deepen the dark feel.
- **Time:** Large 96px `fg` (#ebdbb2) clock, anchored just above center.
- **Date:** Slightly dimmer `fg1` (#d5c4a1) label sitting just below the clock.
- **User label:** Bright aqua (#8ec07c) — matching your `active_border` — floated above the input.
- **Input field:** `bg1` fill with a `gray` idle border. The border shifts to **bright yellow** while verifying, **bright red** on failure, and **bright orange** if caps lock is on.

**To autostart it**, add to `hyprland.conf` alongside `hypridle`:
```hypr/hyprland.conf#L1-1
exec-once = hypridle
```
And make sure `hyprlock` is the `lock_cmd` in `hypridle.conf` (it already is in the config we generated).
