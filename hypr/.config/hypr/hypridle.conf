# hypridle.conf
# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    # Command to run when locking (guards against duplicate instances)
    lock_cmd = pidof hyprlock || hyprlock

    # Lock before sleeping so the screen is never exposed on wake
    before_sleep_cmd = loginctl lock-session

    # Turn displays back on after waking from sleep
    after_sleep_cmd = hyprctl dispatch dpms on
}

# ── Timeouts ────────────────────────────────────────────────────────────────

listener {
    # 15 min: dim displays and switch to power-saver
    timeout = 900
    on-timeout = brightnessctl -s set 25%; powerprofilesctl set power-saver
    on-resume  = brightnessctl -r; powerprofilesctl set balanced
}

listener {
    # 20 min: lock the session
    timeout = 1200
    on-timeout = loginctl lock-session
}

listener {
    # 30 min: turn off all displays to save power
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    # 45 min: suspend the system
    timeout = 2700

    # Support both systemd and non-systemd systems
    on-timeout = sh -c 'if command -v systemctl >/dev/null 2>&1; then systemctl suspend; else loginctl suspend; fi'
}
