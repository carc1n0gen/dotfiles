# hypridle.conf
# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    # Command to run when locking (guards against duplicate instances)
    lock_cmd = pidof hyprlock || hyprlock

    # Lock before sleeping so the screen is never exposed on wake
    before_sleep_cmd = loginctl lock-session

    # Turn displays back on after waking from sleep
    after_sleep_cmd = hyprctl dispatch dpms on
}

# ── Timeouts ────────────────────────────────────────────────────────────────

listener {
    # 5 min: dim displays as an early idle warning
    timeout = 300
    on-timeout = brightnessctl -s set 25%
    on-resume  = brightnessctl -r
}

listener {
    # 15 min: lock the session
    timeout = 900
    on-timeout = loginctl lock-session
}

listener {
    # 30 min: turn off all displays to save power
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    # 45 min: suspend the system
    timeout = 2700
    on-timeout = loginctl suspend
}
