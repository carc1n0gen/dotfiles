interval=5

[wifi]
instance=wlan0
command=~/.i3blocks/network
color=#00FF00
interval=10

[ethernet]
instance=eth0
command=~/.i3blocks/network
color=#00FF00
interval=10

[cpu]
label=
command=~/.i3blocks/cpu_usage
interval=10

[memory]
label=
command=~/.i3blocks/memory
interval=30

[battery]
command=~/.i3blocks/battery
interval=60

[volume]
#command=echo -n ' '; amixer get Master | grep -E -o '[0-9][0-9]?[0-9]?%'
command=~/.i3blocks/volume
interval=once
signal=1
# no interval, only check on SIGRTMIN+1

[weather-waterloo]
#instance=Waterloo,CA
command=~/.i3blocks/weather
interval=1800

[date]
label=
command=date +"%B %e %l:%M"
interval=10
